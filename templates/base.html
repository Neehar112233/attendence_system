<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart AI Face Recognition Attendance System — Automated attendance using face detection and AI.">
    <title>{% block title %}FaceTrack AI — Smart Attendance{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/subjects.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="main-navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo" id="nav-logo" style="gap: 12px; display: flex; align-items: center;">
                <img src="/static/img/logo.png" alt="SVEC" onerror="this.style.display='none'" style="height: 40px; width: auto; background: white; border-radius: 50%; padding: 2px;">
                <span class="logo-text" style="font-size: 1.1rem; letter-spacing: 0;">Sri Vasavi <span class="logo-accent">Engineering College</span></span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="/" class="nav-link {% block nav_home %}{% endblock %}" id="nav-home">Home</a>
                <a href="/register" class="nav-link {% block nav_register %}{% endblock %}" id="nav-register">Register</a>
                <a href="/attendance" class="nav-link {% block nav_attendance %}{% endblock %}" id="nav-attendance">Attendance</a>
                <a href="/dashboard" class="nav-link {% block nav_dashboard %}{% endblock %}" id="nav-dashboard">Dashboard</a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content" style="min-height: calc(100vh - 64px - 80px);">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer style="text-align: center; padding: 2rem; border-top: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 0.9rem; background: var(--bg-secondary);">
        Designed by <span style="color: var(--accent-primary-light); font-weight: 600; letter-spacing: 0.5px;">Neehar</span>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Common Scripts -->
    <script>
        // Mobile nav toggle
        const navToggle = document.getElementById('nav-toggle');
        const navLinks = document.getElementById('nav-links');
        if (navToggle) {
            navToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                navToggle.classList.toggle('active');
            });
        }

        // Toast notification system
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || icons.info}</span>
                <span class="toast-message">${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('main-navbar');
            if (window.scrollY > 20) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
